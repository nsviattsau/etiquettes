
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Impression d'étiquettes DataMatrix</title>

  <!-- Génération DataMatrix côté navigateur -->
  <script src="https://cdn.jsdelivr.net/npm/bwip-js@4.11.1/dist/bwip-js-min.js"></script>

  <style>
    :root {
      --label-width: 100mm;
      --label-height: 30mm;
      --matrix-size: 22mm;
      --font-size: 18pt;
      --gap: 0mm;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    .hint {
      margin: 0 0 16px;
      color: #555;
      line-height: 1.5;
    }

    textarea {
      width: 100%;
      min-height: 170px;
      padding: 12px;
      font-size: 15px;
      resize: vertical;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-family: Arial, Helvetica, sans-serif;
    }

    .settings {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 14px;
      color: #333;
    }

    input[type="number"], select {
      padding: 9px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      background: white;
    }

    .checkbox-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 11px 16px;
      cursor: pointer;
      font-size: 15px;
      background: #222;
      color: white;
    }

    button.secondary {
      background: #666;
    }

    button.danger {
      background: #9b1c1c;
    }

    .status {
      margin-top: 12px;
      color: #444;
      font-size: 14px;
    }

    .print-area {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px;
      min-height: 120px;
    }

    .labels {
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: var(--gap);
    }

    .label {
      width: var(--label-width);
      height: var(--label-height);
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
      page-break-inside: avoid;
      break-inside: avoid;
      overflow: hidden;
      background: white;
      border: 1px dashed #999;
      padding: 2mm 4mm;
    }

    .label.no-border {
      border: none;
    }

    .matrix {
      width: var(--matrix-size);
      height: var(--matrix-size);
      min-width: var(--matrix-size);
      min-height: var(--matrix-size);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .matrix canvas {
      width: var(--matrix-size);
      height: var(--matrix-size);
      display: block;
    }

    .code-text {
      margin-left: 5mm;
      font-size: var(--font-size);
      font-weight: 700;
      line-height: 1.1;
      text-align: left;
      word-break: break-word;
      color: #000;
      flex: 1;
    }

    .empty-state {
      color: #666;
      padding: 20px;
      text-align: center;
      width: 100%;
    }

    @page {
      size: auto;
      margin: 0;
    }

    @media print {
      body {
        background: white;
        margin: 0;
        padding: 0;
      }

      .app {
        max-width: none;
        margin: 0;
        padding: 0;
      }

      .controls {
        display: none !important;
      }

      .print-area {
        border: none;
        border-radius: 0;
        padding: 0;
        margin: 0;
      }

      .labels {
        gap: 0;
      }

      .label {
        border: none !important;
        margin: 0;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="panel controls">
      <h1>Impression d'étiquettes DataMatrix</h1>
      <p class="hint">
        Collez votre liste de codes. Un code par ligne. Le format de l'étiquette est :
        <strong>[DataMatrix] [Code]</strong>.
      </p>

      <textarea id="codesInput" placeholder="ABC-001"></textarea>

      <div class="settings">
        <label>
          Largeur étiquette, mm
          <input id="labelWidth" type="number" min="10" max="200" step="1" value="100" />
        </label>

        <label>
          Hauteur étiquette, mm
          <input id="labelHeight" type="number" min="10" max="100" step="1" value="30" />
        </label>

        <label>
          Taille DataMatrix, mm
          <input id="matrixSize" type="number" min="5" max="80" step="1" value="22" />
        </label>

        <label>
          Taille du texte, pt
          <input id="fontSize" type="number" min="6" max="40" step="1" value="18" />
        </label>

        <label>
          Espace entre étiquettes, mm
          <input id="gapSize" type="number" min="0" max="20" step="1" value="0" />
        </label>

        <label>
          Qualité du DataMatrix
          <select id="scaleValue">
            <option value="3">Normale</option>
            <option value="4" selected>Bonne</option>
            <option value="5">Haute</option>
          </select>
        </label>
      </div>

      <label class="checkbox-row">
        <input id="removeDuplicates" type="checkbox" checked />
        Supprimer les doublons
      </label>

      <label class="checkbox-row">
        <input id="showBorders" type="checkbox" checked />
        Afficher les bordures en aperçu
      </label>

      <div class="buttons">
        <button onclick="generateLabels()">Générer</button>
        <button onclick="window.print()">Imprimer</button>
        <button class="secondary" onclick="loadExample()">Exemple</button>
        <button class="danger" onclick="clearAll()">Effacer</button>
      </div>

      <div id="status" class="status">Aucune étiquette générée.</div>
    </section>

    <section class="print-area">
      <div id="labels" class="labels">
        <div class="empty-state">Les étiquettes apparaîtront ici.</div>
      </div>
    </section>
  </main>

  <script>
    function parseCodes(rawText, removeDuplicates) {
      let values = rawText
        .split(/\r?\n|;|,/)
        .map(value => value.trim())
        .filter(value => value.length > 0);

      if (removeDuplicates) {
        values = [...new Set(values)];
      }

      return values;
    }

    function applySettings() {
      const width = document.getElementById("labelWidth").value || 100;
      const height = document.getElementById("labelHeight").value || 30;
      const matrix = document.getElementById("matrixSize").value || 22;
      const font = document.getElementById("fontSize").value || 18;
      const gap = document.getElementById("gapSize").value || 0;

      document.documentElement.style.setProperty("--label-width", width + "mm");
      document.documentElement.style.setProperty("--label-height", height + "mm");
      document.documentElement.style.setProperty("--matrix-size", matrix + "mm");
      document.documentElement.style.setProperty("--font-size", font + "pt");
      document.documentElement.style.setProperty("--gap", gap + "mm");
    }

    function generateLabels() {
      applySettings();

      const rawText = document.getElementById("codesInput").value;
      const removeDuplicates = document.getElementById("removeDuplicates").checked;
      const showBorders = document.getElementById("showBorders").checked;
      const scaleValue = Number(document.getElementById("scaleValue").value || 4);
      const values = parseCodes(rawText, removeDuplicates);

      const container = document.getElementById("labels");
      const status = document.getElementById("status");

      container.innerHTML = "";

      if (values.length === 0) {
        container.innerHTML = '<div class="empty-state">Veuillez saisir au moins un code.</div>';
        status.textContent = "Aucun code à générer.";
        return;
      }

      values.forEach((value) => {
        const label = document.createElement("div");
        label.className = showBorders ? "label" : "label no-border";

        const matrixBox = document.createElement("div");
        matrixBox.className = "matrix";

        const canvas = document.createElement("canvas");

        const text = document.createElement("div");
        text.className = "code-text";
        text.textContent = value;

        matrixBox.appendChild(canvas);
        label.appendChild(matrixBox);
        label.appendChild(text);
        container.appendChild(label);

        try {
          bwipjs.toCanvas(canvas, {
            bcid: "datamatrix",
            text: value,
            scale: scaleValue,
            paddingwidth: 0,
            paddingheight: 0,
            includetext: false
          });
        } catch (error) {
          matrixBox.innerHTML = "";
          text.textContent = "Erreur : " + value;
          console.error("Erreur DataMatrix :", value, error);
        }
      });

      status.textContent = "Étiquettes générées : " + values.length;
    }

    function loadExample() {
      document.getElementById("codesInput").value = [
        "ABC-001"
      ].join("\n");

      generateLabels();
    }

    function clearAll() {
      document.getElementById("codesInput").value = "";
      document.getElementById("labels").innerHTML = '<div class="empty-state">Les étiquettes apparaîtront ici.</div>';
      document.getElementById("status").textContent = "Aucune étiquette générée.";
    }

    [
      "labelWidth",
      "labelHeight",
      "matrixSize",
      "fontSize",
      "gapSize",
      "scaleValue",
      "showBorders"
    ].forEach(id => {
      document.getElementById(id).addEventListener("change", () => {
        if (document.getElementById("codesInput").value.trim().length > 0) {
          generateLabels();
        } else {
          applySettings();
        }
      });
    });

    applySettings();
  </script>
</body>
</html>
