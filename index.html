   
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Печать этикеток DataMatrix</title>

  <!-- DataMatrix generator. Everything is generated in the browser. -->
  <script src="https://cdn.jsdelivr.net/npm/bwip-js@4.11.1/dist/bwip-js-min.js"></script>

  <style>
    :root {
      --label-width: 40mm;
      --label-height: 25mm;
      --barcode-size: 14mm;
      --font-size: 9pt;
      --gap: 2mm;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    .hint {
      margin: 0 0 16px;
      color: #555;
      line-height: 1.5;
    }

    textarea {
      width: 100%;
      min-height: 170px;
      padding: 12px;
      font-size: 15px;
      resize: vertical;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-family: Arial, sans-serif;
    }

    .settings {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 14px;
      color: #333;
    }

    input[type="number"] {
      padding: 9px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }

    .checkbox-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 11px 16px;
      cursor: pointer;
      font-size: 15px;
      background: #222;
      color: white;
    }

    button.secondary {
      background: #666;
    }

    button.danger {
      background: #9b1c1c;
    }

    .status {
      margin-top: 12px;
      color: #444;
      font-size: 14px;
    }

    .print-area {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px;
      min-height: 120px;
    }

    .labels {
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: var(--gap);
    }

    .label {
      width: var(--label-width);
      height: var(--label-height);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      page-break-inside: avoid;
      break-inside: avoid;
      overflow: hidden;
      background: white;
      border: 1px dashed #aaa;
      padding: 1mm;
    }

    .label.no-border {
      border: none;
    }

    .label canvas {
      width: var(--barcode-size);
      height: var(--barcode-size);
      display: block;
    }

    .code-text {
      margin-top: 1.2mm;
      max-width: calc(var(--label-width) - 3mm);
      font-size: var(--font-size);
      line-height: 1.1;
      text-align: center;
      word-break: break-all;
      color: #000;
    }

    .empty-state {
      color: #666;
      padding: 20px;
      text-align: center;
    }

    @page {
      size: A4;
      margin: 0;
    }

    @media print {
      body {
        background: white;
        margin: 0;
        padding: 0;
      }

      .app {
        max-width: none;
        margin: 0;
        padding: 0;
      }

      .controls {
        display: none !important;
      }

      .print-area {
        border: none;
        border-radius: 0;
        padding: 0;
        margin: 0;
      }

      .labels {
        gap: 0;
      }

      .label {
        border: none !important;
        margin: 0;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="panel controls">
      <h1>Печать этикеток DataMatrix</h1>
      <p class="hint">
        Вставьте список кодов. Каждый код — с новой строки. Нажмите «Сгенерировать», затем «Печать».
      </p>

      <textarea id="codesInput" placeholder="PN123456&#10;PN789012&#10;ABC-001"></textarea>

      <div class="settings">
        <label>
          Ширина этикетки, мм
          <input id="labelWidth" type="number" min="10" max="150" step="1" value="40" />
        </label>

        <label>
          Высота этикетки, мм
          <input id="labelHeight" type="number" min="10" max="150" step="1" value="25" />
        </label>

        <label>
          Размер DataMatrix, мм
          <input id="barcodeSize" type="number" min="5" max="80" step="1" value="14" />
        </label>

        <label>
          Размер текста, pt
          <input id="fontSize" type="number" min="5" max="24" step="1" value="9" />
        </label>

        <label>
          Отступ между этикетками, мм
          <input id="gapSize" type="number" min="0" max="20" step="1" value="2" />
        </label>
      </div>

      <label class="checkbox-row">
        <input id="removeDuplicates" type="checkbox" checked />
        Удалять повторы
      </label>

      <label class="checkbox-row">
        <input id="showBorders" type="checkbox" checked />
        Показывать рамки в предпросмотре
      </label>

      <div class="buttons">
        <button onclick="generateLabels()">Сгенерировать</button>
        <button onclick="window.print()">Печать</button>
        <button class="secondary" onclick="loadExample()">Пример</button>
        <button class="danger" onclick="clearAll()">Очистить</button>
      </div>

      <div id="status" class="status">Этикетки ещё не сгенерированы.</div>
    </section>

    <section class="print-area">
      <div id="labels" class="labels">
        <div class="empty-state">Здесь появятся этикетки для печати.</div>
      </div>
    </section>
  </main>

  <script>
    function parseCodes(rawText, removeDuplicates) {
      let values = rawText
        .split(/\r?\n|;|,/)
        .map(value => value.trim())
        .filter(value => value.length > 0);

      if (removeDuplicates) {
        values = [...new Set(values)];
      }

      return values;
    }

    function applySettings() {
      const width = document.getElementById("labelWidth").value || 40;
      const height = document.getElementById("labelHeight").value || 25;
      const barcode = document.getElementById("barcodeSize").value || 14;
      const font = document.getElementById("fontSize").value || 9;
      const gap = document.getElementById("gapSize").value || 2;

      document.documentElement.style.setProperty("--label-width", width + "mm");
      document.documentElement.style.setProperty("--label-height", height + "mm");
      document.documentElement.style.setProperty("--barcode-size", barcode + "mm");
      document.documentElement.style.setProperty("--font-size", font + "pt");
      document.documentElement.style.setProperty("--gap", gap + "mm");
    }

    function generateLabels() {
      applySettings();

      const rawText = document.getElementById("codesInput").value;
      const removeDuplicates = document.getElementById("removeDuplicates").checked;
      const showBorders = document.getElementById("showBorders").checked;
      const values = parseCodes(rawText, removeDuplicates);

      const container = document.getElementById("labels");
      const status = document.getElementById("status");

      container.innerHTML = "";

      if (values.length === 0) {
        container.innerHTML = '<div class="empty-state">Введите хотя бы один код.</div>';
        status.textContent = "Нет кодов для генерации.";
        return;
      }

      values.forEach((value, index) => {
        const label = document.createElement("div");
        label.className = showBorders ? "label" : "label no-border";

        const canvas = document.createElement("canvas");

        const text = document.createElement("div");
        text.className = "code-text";
        text.textContent = value;

        label.appendChild(canvas);
        label.appendChild(text);
        container.appendChild(label);

        try {
          bwipjs.toCanvas(canvas, {
            bcid: "datamatrix",
            text: value,
            scale: 4,
            paddingwidth: 0,
            paddingheight: 0,
            includetext: false
          });
        } catch (error) {
          label.innerHTML = "";
          const errorText = document.createElement("div");
          errorText.className = "code-text";
          errorText.textContent = "Ошибка: " + value;
          label.appendChild(errorText);
          console.error("DataMatrix generation error for:", value, error);
        }
      });

      status.textContent = "Сгенерировано этикеток: " + values.length;
    }

    function loadExample() {
      document.getElementById("codesInput").value = [
        "PN123456",
        "PN789012",
        "ABC-001",
        "SACHET-001",
        "BOITE-045"
      ].join("\n");

      generateLabels();
    }

    function clearAll() {
      document.getElementById("codesInput").value = "";
      document.getElementById("labels").innerHTML = '<div class="empty-state">Здесь появятся этикетки для печати.</div>';
      document.getElementById("status").textContent = "Этикетки ещё не сгенерированы.";
    }

    ["labelWidth", "labelHeight", "barcodeSize", "fontSize", "gapSize", "showBorders"].forEach(id => {
      document.getElementById(id).addEventListener("change", () => {
        if (document.getElementById("codesInput").value.trim().length > 0) {
          generateLabels();
        } else {
          applySettings();
        }
      });
    });

    applySettings();
  </script>
</body>
</html>
